---
type: Batch
timelimit: 2s
match: Lines

cases:
  - name: sample1
    in: |
      5 3
      1 2 3 4 5
      2 7 4
    out: |
      2
  - name: sample2
    in: |
      4 6
      100 200 300 400
      150 200 250 300 350 400
    out: |
      3
  - name: sample3
    in: |
      10 8
      1000000000 999999999 123456789 987654321 555555555 111111111 222222222 333333333 444444444 666666666
      123456789 100000000 555555555 777777777 888888888 999999999 12345 67890
    out: |
      3

extend:
  - type: Text
    path: "./a"
    in: /in/*.txt
    out: /out/*.txt
